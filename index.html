<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EGE GOLD KUYUMCULUK - CANLI</title>
    <style>
        :root { --gold: #d4af37; --bg: #000000; --panel: #141414; --text: #ffffff; --up: #00ff7f; --down: #ff4d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .board { width: 98%; height: 96vh; background: var(--panel); border: 3px solid var(--gold); border-radius: 15px; display: flex; flex-direction: column; }
        header { background: linear-gradient(180deg, #d4af37, #b8860b); color: #000; padding: 2vh 0; text-align: center; font-size: 6vh; font-weight: 900; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; flex-grow: 1; }
        td { border-bottom: 1px solid #2a2a2a; font-size: 3.5vh; font-weight: 700; text-align: center; padding: 1.2vh 0; }
        td:first-child { text-align: left; padding-left: 5vw; width: 45%; color: #efefef; }
        .up { color: var(--up); margin-left: 10px; } .down { color: var(--down); margin-left: 10px; }
        footer { height: 10vh; text-align: center; background: #0a0a0a; color: var(--gold); font-size: 4vh; border-top: 1px solid #333; padding-top: 1vh; }
    </style>
</head>
<body>
    <div class="board">
        <header>EGE GOLD KUYUMCULUK</header>
        <table>
            <tbody id="priceBody">
                <tr id="GA"><td>24 Ayar Gram</td><td class="buy">---</td><td class="sell">---</td></tr>
                <tr id="22AYAR"><td>22 Ayar Gram</td><td class="buy">---</td><td class="sell">---</td></tr>
                <tr id="14AYAR"><td>14 Ayar Altın</td><td class="buy">---</td><td class="sell">---</td></tr>
                <tr id="CEYREK_YENI"><td>Yeni Çeyrek</td><td class="buy">---</td><td class="sell">---</td></tr>
                <tr id="ATA5_YENI"><td>Ata 5'li</td><td class="buy">---</td><td class="sell">---</td></tr>
                <tr id="USDTRY"><td>Dolar (USD)</td><td class="buy">---</td><td class="sell">---</td></tr>
                <tr id="EURTRY"><td>Euro (EUR)</td><td class="buy">---</td><td class="sell">---</td></tr>
            </tbody>
        </table>
        <footer>ŞANLIURFA<div id="status" style="font-size: 1.5vh; color: #444;">Canlı Veriler Yükleniyor...</div></footer>
    </div>

    <script>
        // Senin yeni anahtarın
        const API_KEY = '2b2c3d9c14msha336e30c4297af7p1958ecjsnf77059e7c5c0'; 
        const API_URL = 'https://harem-altin-live-gold-price-data.p.rapidapi.com/harem_altin/prices/23b4c2fb31a242d1eebc0df9b9b65e5e';

        async function fetchPrices() {
            try {
                // GitHub engeline takılmamak için bu proxy zorunlu
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(API_URL)}`, {
                    headers: { 
                        'x-rapidapi-key': API_KEY, 
                        'x-rapidapi-host': 'harem-altin-live-gold-price-data.p.rapidapi.com' 
                    }
                });
                const wrapper = await response.json();
                const result = JSON.parse(wrapper.contents);
                const data = result.data;

                const items = ['GA', '22AYAR', '14AYAR', 'CEYREK_YENI', 'ATA5_YENI', 'USDTRY', 'EURTRY'];
                items.forEach(id => {
                    const item = data[id];
                    if (item) {
                        let alis = parseFloat(item.alis.replace('.', '').replace(',', '.'));
                        let satis = parseFloat(item.satis.replace('.', '').replace(',', '.'));
                        // Altın grubu makas farkı
                        if(!id.includes('TRY')) { alis -= 20; satis += 200; }
                        
                        const icon = item.direction === 'up' ? '<span class="up">▲</span>' : '<span class="down">▼</span>';
                        document.querySelector(`#${id} .buy`).innerHTML = alis.toLocaleString('tr-TR', {minimumFractionDigits: 2}) + icon;
                        document.querySelector(`#${id} .sell`).innerHTML = satis.toLocaleString('tr-TR', {minimumFractionDigits: 2}) + icon;
                    }
                });
                document.getElementById('status').innerText = "Canlı Güncelleme: " + new Date().toLocaleTimeString('tr-TR');
            } catch (e) {
                document.getElementById('status').innerText = "Bağlantı Kontrol Ediliyor...";
            }
        }
        fetchPrices();
        setInterval(fetchPrices, 30000); // 30 saniyede bir güncelle
    </script>
</body>
</html>
