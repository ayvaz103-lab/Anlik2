<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efe Gold Kuyumcu | Canlı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Orbitron:wght@500;700&display=swap');
        body { font-family: 'Montserrat', sans-serif; background-color: #05070a; color: white; margin: 0; overflow-x: hidden; }
        .gold-card { background: linear-gradient(160deg, #11141b 0%, #080a0f 100%); border: 1px solid #1e222d; border-radius: 1.5rem; transition: 0.3s; }
        .gold-card:hover { border-color: #d4af37; box-shadow: 0 0 30px rgba(212, 175, 55, 0.15); }
        .price-font { font-family: 'Orbitron', sans-serif; letter-spacing: -1px; }
        .text-gold { color: #d4af37; }
        .live-pulse { width: 10px; height: 10px; background: #10b981; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }
        /* Scrollbar Gizleme */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="p-6 bg-black border-b border-yellow-900/30 sticky top-0 z-50 shadow-2xl backdrop-blur-md bg-opacity-90">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-3xl md:text-4xl font-black italic tracking-tighter uppercase">
                    <span class="text-gold">Efe Gold</span> <span class="font-light text-gray-300">Kuyumcu</span>
                </h1>
                <div class="flex items-center gap-3 mt-1">
                    <span id="date" class="text-[10px] text-gray-500 uppercase tracking-[0.2em]">27 Nisan 2026</span>
                    <span class="live-pulse"></span>
                    <span class="text-[10px] font-bold text-green-500 uppercase italic">Canlı Veri</span>
                </div>
            </div>
            <div class="text-right">
                <div id="clock" class="text-2xl font-bold text-gold price-font">15:37:14</div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto w-full p-4 md:p-8 flex-grow">
        <div id="price-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="col-span-full text-center py-40">
                <i class="fas fa-circle-notch fa-spin text-4xl text-gold"></i>
                <p class="mt-4 text-gray-500 tracking-widest uppercase text-xs">Sistem Başlatılıyor...</p>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-gray-800 text-[10px] uppercase tracking-[0.5em] border-t border-gray-950">
        © 2026 EFE GOLD KUYUMCU - Tüm Hakları Saklıdır
    </footer>

    <script>
        // --- HESAPLAMA MOTORU (GİZLİ) ---
        const KAR_SATIŞ = 250; // Satışın üstüne sessizce eklenir
        const KAR_ALIŞ = 20;   // Alıştan sessizce düşülür

        const URUNLER = [
            { id: "gram-altin", ad: "Gram Altın (24A)", icon: "fa-coins", type: "gold" },
            { id: "22-ayar-bilezik", ad: "22 Ayar Bilezik", icon: "fa-ring", type: "gold" },
            { id: "ceyrek-altin", ad: "Çeyrek Altın", icon: "fa-dot-circle", type: "gold" },
            { id: "yarim-altin", ad: "Yarım Altın", icon: "fa-adjust", type: "gold" },
            { id: "tam-altin", ad: "Tam Altın", icon: "fa-circle", type: "gold" },
            { id: "gumus", ad: "Has Gümüş (GR)", icon: "fa-gem", type: "other" },
            { id: "USD", ad: "ABD Doları", icon: "fa-dollar-sign", type: "other" },
            { id: "EUR", ad: "Euro", icon: "fa-euro-sign", type: "other" }
        ];

        async function updateMarket() {
            try {
                // Veriler Finans Truncgil üzerinden (Piyasa Standardı) çekiliyor
                const response = await fetch('https://finans.truncgil.com/today.json');
                const data = await response.json();
                render(data);
            } catch (error) {
                console.log("Bağlantı bekleniyor...");
            }
        }

        function render(data) {
            const grid = document.getElementById('price-grid');
            grid.innerHTML = '';

            URUNLER.forEach(item => {
                const piyasa = data[item.id];
                if (!piyasa) return;

                let hamAlis = parseFloat(piyasa.Alış.replace('.', '').replace(',', '.'));
                let hamSatis = parseFloat(piyasa.Satış.replace('.', '').replace(',', '.'));

                let gosterAlis, gosterSatis;

                if (item.type === "gold") {
                    // Gizli Hesaplama
                    gosterAlis = hamAlis - KAR_ALIŞ;
                    gosterSatis = hamSatis + KAR_SATIŞ;
                } else {
                    gosterAlis = hamAlis;
                    gosterSatis = hamSatis;
                }

                grid.innerHTML += `
                    <div class="gold-card p-7 shadow-2xl relative">
                        <div class="flex justify-between items-center mb-8">
                            <div class="w-12 h-12 bg-gray-900 rounded-2xl flex items-center justify-center border border-gray-800">
                                <i class="fas ${item.icon} text-xl text-gold"></i>
                            </div>
                            <span class="text-[11px] font-black text-gray-500 uppercase tracking-widest text-right">${item.ad}</span>
                        </div>

                        <div class="flex justify-between items-end">
                            <div class="flex flex-col">
                                <span class="text-[9px] text-gray-600 font-bold uppercase mb-1 tracking-tighter">ALIŞ</span>
                                <span class="price-font text-xl font-bold text-gray-300 italic">${format(gosterAlis)}</span>
                            </div>
                            <div class="flex flex-col text-right">
                                <span class="text-[9px] text-gold font-bold uppercase mb-1 tracking-tighter">SATIŞ</span>
                                <span class="price-font text-3xl font-black text-white">${format(gosterSatis)}</span>
                            </div>
                        </div>
                        
                        <div class="mt-5 pt-4 border-t border-gray-900/50 flex justify-between items-center">
                            <span class="text-[8px] text-gray-800 font-bold uppercase italic">Efe Gold Exclusive</span>
                            <span class="text-[8px] text-gray-800">TÜRK LİRASI (TL)</span>
                        </div>
                    </div>
                `;
            });
        }

        function format(n) {
            return n.toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function clock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('tr-TR');
            document.getElementById('date').innerText = now.toLocaleDateString('tr-TR', { day:'numeric', month:'long', year:'numeric'});
        }

        setInterval(clock, 1000);
        setInterval(updateMarket, 20000); // 20 saniyede bir sessiz güncelleme

        clock();
        updateMarket();
    </script>
</body>
</html>
